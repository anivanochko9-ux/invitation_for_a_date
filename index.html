<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Анімація серця з частинками</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Стилі для кнопки-посилання */
        .center-link {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 0, 64, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            text-decoration: none;
            z-index: 2;
            font-family: Arial, sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(3px);
            user-select: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .center-link:hover {
            background: rgba(255, 0, 64, 0.25);
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            transform: translate(-50%, -50%) scale(1.05);
        }

        .center-link:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        /* Адаптація для мобільних */
        @media (max-width: 768px) {
            .center-link {
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <!-- Кнопка-посилання по центру -->
    <a href="/index2.html" class="center-link" id="heartLink">
        💖 Click on me 💖
    </a>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "gsap": "https://unpkg.com/gsap@3.12.2/index.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import gsap from 'gsap';

        // --- ВИЗНАЧЕННЯ МОБІЛЬНОГО ПРИСТРОЮ ---
        const isMobile = window.innerWidth < 768;
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // --- ЕЛЕМЕНТИ ---
        const link = document.getElementById('heartLink');

        // --- СЦЕНА ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        // --- КАМЕРА ---
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 200);
        camera.lookAt(0, 0, 0);

        // --- РЕНДЕРЕР ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2));
        document.body.appendChild(renderer.domElement);

        // --- СТВОРЕННЯ СЕРЦЯ ---
        const heartPoints = [];
        const scale = 5;

        for (let i = 0; i <= 200; i++) {
            const t = (i / 200) * Math.PI * 2;
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            heartPoints.push(new THREE.Vector3(x * scale, y * scale, 0));
        }

        const curve = new THREE.CatmullRomCurve3(heartPoints);
        const curvePoints = curve.getPoints(400);

        // --- ЧАСТИНКИ (АДАПТИВНА КІЛЬКІСТЬ) ---
        const particleCount = isMobile ? 500 : 1000;
        const glowCount = isMobile ? 150 : 300;

        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const targetPositions = [];
        const delays = [];

        const colorCenter = new THREE.Color(0xff0040);
        const colorMid = new THREE.Color(0xff6b8a);
        const colorOuter = new THREE.Color(0x9b59b6);

        for (let i = 0; i < particleCount; i++) {
            const idx = Math.floor(Math.random() * curvePoints.length);
            const point = curvePoints[idx];

            const offsetX = (Math.random() - 0.5) * 6;
            const offsetY = (Math.random() - 0.5) * 6;
            const offsetZ = (Math.random() - 0.5) * 20;

            targetPositions.push({
                x: point.x + offsetX,
                y: point.y + offsetY,
                z: point.z + offsetZ
            });

            positions[i * 3] = 0;
            positions[i * 3 + 1] = 0;
            positions[i * 3 + 2] = 0;

            const rand = Math.random();
            let color;
            if (rand < 0.5) {
                color = colorCenter.clone().lerp(colorMid, rand * 2);
            } else {
                color = colorMid.clone().lerp(colorOuter, (rand - 0.5) * 2);
            }

            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;

            delays.push(Math.random());
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: isMobile ? 2.0 : 2.5,
            vertexColors: true,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true,
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- СЯЙВО ---
        const glowGeometry = new THREE.BufferGeometry();
        const glowPositions = new Float32Array(glowCount * 3);
        const glowColors = new Float32Array(glowCount * 3);

        for (let i = 0; i < glowCount; i++) {
            const idx = Math.floor(Math.random() * curvePoints.length);
            const point = curvePoints[idx];
            glowPositions[i * 3] = point.x + (Math.random() - 0.5) * 30;
            glowPositions[i * 3 + 1] = point.y + (Math.random() - 0.5) * 30;
            glowPositions[i * 3 + 2] = (Math.random() - 0.5) * 40;

            const bright = 0.1 + Math.random() * 0.2;
            glowColors[i * 3] = 1 * bright;
            glowColors[i * 3 + 1] = 0.2 * bright;
            glowColors[i * 3 + 2] = 0.5 * bright;
        }

        glowGeometry.setAttribute('position', new THREE.BufferAttribute(glowPositions, 3));
        glowGeometry.setAttribute('color', new THREE.BufferAttribute(glowColors, 3));

        const glowMaterial = new THREE.PointsMaterial({
            size: isMobile ? 1.5 : 2,
            vertexColors: true,
            transparent: true,
            opacity: 0.2,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true,
        });

        const glowSystem = new THREE.Points(glowGeometry, glowMaterial);
        scene.add(glowSystem);

        // --- АНІМАЦІЯ ---
        const startPos = new Float32Array(positions);
        const data = { progress: 0 };

        const tl = gsap.timeline({
            repeat: -1,
            yoyo: true,
            ease: "power2.inOut",
            onUpdate: () => {
                const pos = geometry.attributes.position.array;
                const p = data.progress;

                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    const target = targetPositions[i];
                    const delay = delays[i];

                    let pAdjusted = (p - delay * 0.3) / (1 - delay * 0.3);
                    pAdjusted = Math.max(0, Math.min(1, pAdjusted));

                    const eased = pAdjusted * pAdjusted * (3 - 2 * pAdjusted);

                    pos[i3] = startPos[i3] + (target.x - startPos[i3]) * eased;
                    pos[i3 + 1] = startPos[i3 + 1] + (target.y - startPos[i3 + 1]) * eased;
                    pos[i3 + 2] = startPos[i3 + 2] + (target.z - startPos[i3 + 2]) * eased;
                }

                geometry.attributes.position.needsUpdate = true;
            }
        });

        tl.to(data, {
            progress: 1,
            duration: 4,
            ease: "power2.inOut"
        });

        // --- ДОДАТКОВІ АНІМАЦІЇ ---
        const cameraTl = gsap.timeline({
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });
        cameraTl.to(camera.position, {
            z: 180,
            duration: 4
        });

        const glowTl = gsap.timeline({
            repeat: -1,
            ease: "none"
        });
        glowTl.to(glowSystem.rotation, {
            z: Math.PI * 2,
            duration: 30
        });

        const pulseTl = gsap.timeline({
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });
        pulseTl.to(material, {
            size: isMobile ? 2.5 : 3,
            duration: 1.5
        });

        // --- ОБРОБНИК КЛІКУ НА ПОСИЛАННЯ ---
        link.addEventListener('click', (e) => {
            // Ефект при кліку - частинки "вибухають"
            const pos = geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                pos[i3] += (Math.random() - 0.5) * 8;
                pos[i3 + 1] += (Math.random() - 0.5) * 8;
                pos[i3 + 2] += (Math.random() - 0.5) * 8;
            }
            geometry.attributes.position.needsUpdate = true;

            // Повертаємо частинки назад через 300ms
            setTimeout(() => {
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    pos[i3] = startPos[i3];
                    pos[i3 + 1] = startPos[i3 + 1];
                    pos[i3 + 2] = startPos[i3 + 2];
                }
                geometry.attributes.position.needsUpdate = true;
            }, 300);
        });

        // Для мобільних - обробник дотику
        if (isTouchDevice) {
            link.addEventListener('touchstart', (e) => {
                // Той самий ефект для дотику
                const pos = geometry.attributes.position.array;
                for (let i = 0; i < particleCount; i++) {
                    const i3 = i * 3;
                    pos[i3] += (Math.random() - 0.5) * 8;
                    pos[i3 + 1] += (Math.random() - 0.5) * 8;
                    pos[i3 + 2] += (Math.random() - 0.5) * 8;
                }
                geometry.attributes.position.needsUpdate = true;

                setTimeout(() => {
                    for (let i = 0; i < particleCount; i++) {
                        const i3 = i * 3;
                        pos[i3] = startPos[i3];
                        pos[i3 + 1] = startPos[i3 + 1];
                        pos[i3 + 2] = startPos[i3 + 2];
                    }
                    geometry.attributes.position.needsUpdate = true;
                }, 300);
            });
        }

        // --- РЕНДЕРИНГ З ОПТИМІЗАЦІЄЮ ДЛЯ МОБІЛЬНИХ ---
        let frameCount = 0;
        function animate() {
            requestAnimationFrame(animate);
            frameCount++;

            // На мобільних пропускаємо кожен другий кадр для економії ресурсів
            if (isMobile && frameCount % 2 === 0) {
                renderer.render(scene, camera);
                return;
            }

            particleSystem.rotation.z += 0.0005;
            glowSystem.rotation.z += 0.0003;

            renderer.render(scene, camera);
        }

        animate();

        // --- АДАПТАЦІЯ ---
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        console.log('❤️ Серце з частинками та кнопкою-посиланням працює!');
    </script>
</body>

</html>
